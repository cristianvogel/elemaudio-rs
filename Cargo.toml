[package]
name = "elemaudio-rs"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[lib]
name = "elemaudio_rs"
path = "src/lib.rs"

[features]
default = []
resources = ["dep:elemaudio-resources"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rkyv = { version = "0.7", features = ["validation"] }
cpal = "0.15"
symphonia = { version = "0.5", features = ["wav"] }
elemaudio-resources = { git = "https://github.com/cristianvogel/elemaudio-resources", package = "elemaudio-resources", optional = true }

[build-dependencies]
cc = "1"
