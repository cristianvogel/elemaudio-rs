<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Stride Delay - elemaudio-rs example</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui, sans-serif; background:#1a1a1a; color:#ccc; padding:20px; }
  h1 { font-size:16px; font-weight:600; color:#e0e0e0; margin-bottom:16px; }
  .param { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .param label { width:90px; font-size:13px; text-align:right; flex-shrink:0; }
  .param input[type=range] { flex:1; accent-color:#5a9; height:6px; }
  .param .val { width:64px; font-size:13px; text-align:left; color:#8d8; font-variant-numeric:tabular-nums; }
  #status { position:fixed; bottom:0; left:0; right:0; padding:4px 12px;
    font-size:11px; background:#111; color:#666; border-top:1px solid #333; }
</style>
</head>
<body>
<h1>Stride Delay</h1>
<div class="param">
  <label for="delay_ms">Delay Time</label>
  <input type="range" id="delay_ms" min="0" max="1" step="0.001" value="0.5">
  <span class="val" id="delay_ms_val">250 ms</span>
</div>
<div class="param">
  <label for="feedback">Feedback</label>
  <input type="range" id="feedback" min="0" max="0.95" step="0.001" value="0">
  <span class="val" id="feedback_val">0%</span>
</div>
<div class="param">
  <label for="transition_ms">Transition</label>
  <input type="range" id="transition_ms" min="0" max="1" step="0.001" value="0.5">
  <span class="val" id="transition_ms_val">60 ms</span>
</div>
<div class="param">
  <label for="mix">Mix</label>
  <input type="range" id="mix" min="0" max="1" step="0.001" value="0.5">
  <span class="val" id="mix_val">50%</span>
</div>
<div id="status">Ready</div>

<script>
(function() {
  'use strict';

  // Logarithmic taper helpers: map 0-1 slider to min-max on a log scale.
  var DELAY_MIN = 10, DELAY_MAX = 1200;
  var TRANS_MIN = 1,  TRANS_MAX = 250;

  function logToValue(norm, min, max) {
    return min * Math.pow(max / min, norm);
  }
  function valueToLog(val, min, max) {
    return Math.log(val / min) / Math.log(max / min);
  }

  var sequence = 0;
  var requestId = 0;
  var sliders = {
    delay_ms:      { el: q('delay_ms'),      valEl: q('delay_ms_val'),      fmt: fmtMs,  toVal: function(n){return logToValue(n,DELAY_MIN,DELAY_MAX);}, toNorm: function(v){return valueToLog(v,DELAY_MIN,DELAY_MAX);} },
    feedback:      { el: q('feedback'),       valEl: q('feedback_val'),      fmt: fmtPct, toVal: function(n){return +n;}, toNorm: function(v){return v;} },
    transition_ms: { el: q('transition_ms'),  valEl: q('transition_ms_val'), fmt: fmtTMs, toVal: function(n){return logToValue(n,TRANS_MIN,TRANS_MAX);}, toNorm: function(v){return valueToLog(v,TRANS_MIN,TRANS_MAX);} },
    mix:           { el: q('mix'),            valEl: q('mix_val'),           fmt: fmtMix, toVal: function(n){return +n;}, toNorm: function(v){return v;} }
  };

  function q(id) { return document.getElementById(id); }
  function fmtMs(v)  { return Math.round(v) + ' ms'; }
  function fmtTMs(v) { return Math.round(v) + ' ms'; }
  function fmtPct(v) { return Math.round(v * 100) + '%'; }
  function fmtMix(v) { return Math.round(v * 100) + '%'; }
  function status(msg) { q('status').textContent = msg; }

  // Set up slider input handlers.
  Object.keys(sliders).forEach(function(paramId) {
    var s = sliders[paramId];
    s.el.addEventListener('input', function() {
      var value = s.toVal(parseFloat(s.el.value));
      s.valEl.textContent = s.fmt(value);
      sequence++;
      sendCommand({ type: 'set_parameter', update: { parameter_id: paramId, value: value, source: 'ui', sequence: sequence } });
    });
  });

  // IPC: send command to host.
  function sendCommand(command) {
    requestId++;
    var envelope = JSON.stringify({ request_id: requestId, command: command });
    if (window.ipc && window.ipc.postMessage) {
      window.ipc.postMessage(envelope);
    }
  }

  // Listen for host -> UI events.
  window.addEventListener('event:engine-event', function(e) {
    var detail = e.detail;
    if (!detail || !detail.event) return;
    var evt = detail.event;
    if (evt.type === 'parameter_changed' && evt.update) {
      applyUpdate(evt.update);
    } else if (evt.type === 'snapshot' && evt.parameters) {
      evt.parameters.forEach(applyUpdate);
      status('Snapshot received');
    }
  });

  // Listen for command ack/nack.
  window.addEventListener('event:command-response', function(e) {
    var d = e.detail;
    if (d && d.accepted === false) {
      status('Command ' + d.request_id + ' rejected');
    }
  });

  function applyUpdate(u) {
    var s = sliders[u.parameter_id];
    if (!s) return;
    s.el.value = s.toNorm(u.value);
    s.valEl.textContent = s.fmt(u.value);
  }

  // On load, request a full snapshot from the host.
  sendCommand({ type: 'request_snapshot' });
  status('Waiting for host...');
})();
</script>
</body>
</html>
